<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Vehículo | Pura Vida Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .btn-regresar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-regresar:hover {
            background: #ce1126;
            border-color: #ce1126;
            transform: translateX(-5px);
        }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div class="container mx-auto px-4 pt-8">
        <a href="index.html" class="btn-regresar inline-flex items-center gap-3 px-6 py-3 rounded-xl text-sm font-black uppercase italic tracking-tighter shadow-lg">
            <i class="fas fa-arrow-left"></i> Regresar al Inventario
        </a>
    </div>

    <div id="detalle-auto" class="container mx-auto px-4 py-10">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#ce1126] mb-4"></div>
            <p class="animate-pulse italic font-bold text-slate-500">CALIBRANDO MOTORES...</p>
        </div>
    </div>

    <script>
        const USER = 'stewardsprofile-ux';
        const REPO = 'puravidamotororiginal';
        const FOLDER = 'assets/data/autos';

        async function cargarDetalle() {
            const params = new URLSearchParams(window.location.search);
            const idBuscado = params.get('id');
            const contenedor = document.getElementById('detalle-auto');

            if (!idBuscado) {
                window.location.href = 'index.html';
                return;
            }

            try {
                // Listamos los archivos para encontrar el correcto
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
                const files = await response.json();
                
                let autoEncontrado = null;

                // Buscamos en cada archivo JSON
                for (let file of files) {
                    if (file.name.endsWith('.json')) {
                        const resAuto = await fetch(file.download_url);
                        const auto = await resAuto.json();

                        // Comparación flexible de ID (quitando espacios y convirtiendo a minúsculas)
                        if (auto.id === idBuscado || encodeURIComponent(auto.id) === idBuscado) {
                            autoEncontrado = auto;
                            break;
                        }
                    }
                }

                if (autoEncontrado) {
                    const auto = autoEncontrado;
                    const precioFormateado = new Intl.NumberFormat('es-CR', { 
                        style: 'currency', currency: 'CRC', minimumFractionDigits: 0 
                    }).format(auto.precio || 0);
                    
                    // CORRECCIÓN DE UNDEFINED: Si el dato no existe, ponemos un guión o N/A
                    const km = auto.km || '---';
                    const transmision = auto.transmision || 'Consultar';
                    const combustible = auto.combustible || 'Consultar';
                    const traccion = auto.traccion || 'Consultar';
                    const descripcion = auto.descripcion || 'Sin descripción disponible.';

                    contenedor.innerHTML = `
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                            <div>
                                <img src="${auto.imagen}" class="w-full rounded-3xl shadow-2xl border-2 border-slate-800 object-cover h-[500px]">
                                <div class="grid grid-cols-3 gap-4 mt-6">
                                    ${auto.galeria ? auto.galeria.map(img => `
                                        <img src="${img.foto}" class="rounded-xl border border-slate-700 h-32 w-full object-cover hover:border-[#ce1126] transition-all cursor-pointer">
                                    `).join('') : ''}
                                </div>
                            </div>

                            <div class="flex flex-col justify-center">
                                <h1 class="text-6xl font-black italic uppercase mb-2 leading-none tracking-tighter text-white">
                                    ${auto.marca} <span class="text-slate-500">${auto.modelo}</span>
                                </h1>
                                <p class="text-[#ce1126] text-5xl font-black mb-8 italic tracking-tighter">${precioFormateado}</p>
                                
                                <div class="grid grid-cols-2 gap-6 mb-10 bg-[#0a0a0a] p-8 rounded-3xl border border-slate-900 shadow-inner">
                                    <div class="flex items-center gap-4 text-slate-300 font-bold uppercase text-xs tracking-widest">
                                        <i class="fas fa-road text-[#ce1126] text-2xl"></i> 
                                        <span>${km}</span>
                                    </div>
                                    <div class="flex items-center gap-4 text-slate-300 font-bold uppercase text-xs tracking-widest">
                                        <i class="fas fa-cog text-[#ce1126] text-2xl"></i> 
                                        <span>${transmision}</span>
                                    </div>
                                    <div class="flex items-center gap-4 text-slate-300 font-bold uppercase text-xs tracking-widest">
                                        <i class="fas fa-gas-pump text-[#ce1126] text-2xl"></i> 
                                        <span>${combustible}</span>
                                    </div>
                                    <div class="flex items-center gap-4 text-slate-300 font-bold uppercase text-xs tracking-widest">
                                        <i class="fas fa-truck-monster text-[#ce1126] text-2xl"></i> 
                                        <span>${traccion}</span>
                                    </div>
                                </div>

                                <div class="mb-10">
                                    <h3 class="text-[#ce1126] font-black uppercase tracking-[0.2em] mb-4 italic text-sm">Descripción del Asesor</h3>
                                    <p class="text-slate-400 text-lg leading-relaxed whitespace-pre-line border-l-2 border-slate-800 pl-6">${descripcion}</p>
                                </div>

                                <a href="https://wa.me/50671162806?text=${encodeURIComponent('¡Hola! Estoy interesado en el ' + auto.marca + ' ' + auto.modelo + ' que vi en la web.')}" 
                                   class="bg-[#ce1126] hover:bg-white hover:text-black text-white text-center font-black py-6 rounded-2xl transition-all shadow-2xl uppercase italic text-2xl flex items-center justify-center gap-4 border-b-8 border-black active:border-b-0 active:translate-y-1">
                                    <i class="fab fa-whatsapp"></i> COMPRAR AHORA
                                </a>
                            </div>
                        </div>
                    `;
                } else {
                    contenedor.innerHTML = `
                        <div class="text-center py-20">
                            <i class="fas fa-search text-slate-800 text-8xl mb-6"></i>
                            <h2 class="text-3xl font-black italic uppercase">Vehículo no encontrado</h2>
                            <p class="text-slate-500 mt-2">El ID solicitado no coincide con nuestro inventario actual.</p>
                        </div>`;
                }
            } catch (e) {
                console.error(e);
                contenedor.innerHTML = `<h2 class="text-center text-[#ce1126] font-bold">ERROR AL CONECTAR CON EL INVENTARIO</h2>`;
            }
        }
        cargarDetalle();
    </script>
</body>
</html>
