<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Vehículo | Pura Vida Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white font-sans">
    <div id="detalle-auto" class="container mx-auto px-4 py-10">
        <p class="text-center animate-pulse">Cargando detalles del motor...</p>
    </div>

    <script>
        const USER = 'stewardsprofile-ux';
        const REPO = 'puravidamotororiginal';
        const FOLDER = 'assets/data/autos';

        async function cargarDetalle() {
            const params = new URLSearchParams(window.location.search);
            const idBuscado = params.get('id');
            const contenedor = document.getElementById('detalle-auto');

            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
                const files = await response.json();
                
                // Buscamos el archivo JSON que tenga el ID dentro
                for (let file of files) {
                    const resAuto = await fetch(file.download_url);
                    const auto = await resAuto.json();

                    if (auto.id === idBuscado) {
                        const precioFormateado = new Intl.NumberFormat('es-CR', { style: 'currency', currency: 'CRC', minimumFractionDigits: 0 }).format(auto.precio);
                        
                        contenedor.innerHTML = `
                            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                <div>
                                    <img src="${auto.imagen}" class="w-full rounded-3xl shadow-2xl border-2 border-slate-800">
                                    <div class="grid grid-cols-3 gap-4 mt-6">
                                        ${auto.galeria ? auto.galeria.map(img => `<img src="${img.foto}" class="rounded-xl border border-slate-700 h-32 object-cover">`).join('') : ''}
                                    </div>
                                </div>
                                <div class="flex flex-col justify-center">
                                    <h1 class="text-6xl font-black italic uppercase mb-2">${auto.marca} ${auto.modelo}</h1>
                                    <p class="text-[#ce1126] text-5xl font-black mb-8 italic">${precioFormateado}</p>
                                    
                                    <div class="grid grid-cols-2 gap-6 mb-10 bg-[#111] p-8 rounded-3xl border border-slate-800">
                                        <div class="flex items-center gap-4 text-slate-400 font-bold uppercase text-sm">
                                            <i class="fas fa-road text-[#ce1126] text-2xl"></i> ${auto.km}
                                        </div>
                                        <div class="flex items-center gap-4 text-slate-400 font-bold uppercase text-sm">
                                            <i class="fas fa-cog text-[#ce1126] text-2xl"></i> ${auto.transmision}
                                        </div>
                                        <div class="flex items-center gap-4 text-slate-400 font-bold uppercase text-sm">
                                            <i class="fas fa-gas-pump text-[#ce1126] text-2xl"></i> ${auto.combustible}
                                        </div>
                                        <div class="flex items-center gap-4 text-slate-400 font-bold uppercase text-sm">
                                            <i class="fas fa-truck-monster text-[#ce1126] text-2xl"></i> ${auto.traccion}
                                        </div>
                                    </div>

                                    <h3 class="text-[#ce1126] font-black uppercase tracking-widest mb-4 italic">Descripción del Asesor</h3>
                                    <p class="text-slate-300 text-lg leading-relaxed mb-10 whitespace-pre-line">${auto.descripcion}</p>

                                    <a href="https://wa.me/50671162806?text=Hola! Estoy interesado en el ${auto.marca} ${auto.modelo} que vi en la web." 
                                       class="bg-[#ce1126] hover:bg-green-600 text-white text-center font-black py-6 rounded-2xl transition-all shadow-2xl uppercase italic text-2xl flex items-center justify-center gap-4">
                                        <i class="fab fa-whatsapp"></i> COMPRAR AHORA
                                    </a>
                                </div>
                            </div>
                        `;
                        return;
                    }
                }
                contenedor.innerHTML = `<h2 class="text-center text-3xl">Vehículo no encontrado. Revisa el ID en el panel.</h2>`;
            } catch (e) {
                contenedor.innerHTML = `<h2 class="text-center">Error al conectar con la base de datos.</h2>`;
            }
        }
        cargarDetalle();
    </script>
</body>
</html>
