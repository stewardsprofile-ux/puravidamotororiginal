<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Vehículo | Pura Vida Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .titulo-plateado {
            background: linear-gradient(to bottom, #ffffff 0%, #a3a3a3 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .carousel-container { position: relative; overflow: hidden; border-radius: 1.5rem; }
        .carousel-slide { display: none; width: 100%; height: 500px; object-fit: cover; }
        .carousel-slide.active { display: block; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-black text-slate-300 font-sans">

    <nav class="bg-[#111] shadow-2xl p-4 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <i class="fas fa-arrow-left text-[#ce1126]"></i>
                <span class="text-xl font-black italic titulo-plateado uppercase">VOLVER AL INVENTARIO</span>
            </a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <div class="space-y-6">
                <div class="carousel-container bg-[#111] border-2 border-slate-800 shadow-2xl">
                    <div id="carousel-images">
                        </div>
                    
                    <button onclick="changeSlide(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-[#ce1126] text-white w-12 h-12 rounded-full transition flex items-center justify-center">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button onclick="changeSlide(1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-[#ce1126] text-white w-12 h-12 rounded-full transition flex items-center justify-center">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                
                <div id="thumbnails" class="grid grid-cols-4 gap-4">
                    </div>
            </div>

            <div class="flex flex-col justify-center">
                <h1 id="auto-titulo" class="text-5xl md:text-6xl font-black text-white uppercase italic mb-2 tracking-tighter">Cargando...</h1>
                <p id="auto-precio" class="text-[#ce1126] text-4xl font-black mb-8 italic tracking-tighter border-b border-slate-800 pb-6"></p>

                <div class="grid grid-cols-2 gap-6 mb-10">
                    <div class="bg-[#111] p-4 rounded-2xl border border-slate-800 flex items-center gap-4">
                        <i class="fas fa-road text-[#ce1126] text-xl"></i>
                        <div>
                            <p class="text-[10px] uppercase font-bold text-slate-500">Recorrido</p>
                            <p id="auto-km" class="font-black text-white italic">---</p>
                        </div>
                    </div>
                    <div class="bg-[#111] p-4 rounded-2xl border border-slate-800 flex items-center gap-4">
                        <i class="fas fa-cog text-[#ce1126] text-xl"></i>
                        <div>
                            <p class="text-[10px] uppercase font-bold text-slate-500">Transmisión</p>
                            <p id="auto-transmision" class="font-black text-white italic">---</p>
                        </div>
                    </div>
                    <div class="bg-[#111] p-4 rounded-2xl border border-slate-800 flex items-center gap-4">
                        <i class="fas fa-gas-pump text-[#ce1126] text-xl"></i>
                        <div>
                            <p class="text-[10px] uppercase font-bold text-slate-500">Combustible</p>
                            <p id="auto-combustible" class="font-black text-white italic">---</p>
                        </div>
                    </div>
                    <div class="bg-[#111] p-4 rounded-2xl border border-slate-800 flex items-center gap-4">
                        <i class="fas fa-truck-monster text-[#ce1126] text-xl"></i>
                        <div>
                            <p class="text-[10px] uppercase font-bold text-slate-500">Tracción</p>
                            <p id="auto-traccion" class="font-black text-white italic">---</p>
                        </div>
                    </div>
                </div>

                <div class="mb-10">
                    <h3 class="text-[#ce1126] font-black uppercase italic tracking-widest text-sm mb-4">Descripción del Asesor</h3>
                    <p id="auto-descripcion" class="text-slate-400 leading-relaxed whitespace-pre-line bg-[#050505] p-6 rounded-2xl border border-slate-900"></p>
                </div>

                <a id="btn-whatsapp" href="#" target="_blank" class="block text-center bg-[#ce1126] text-white font-black py-6 rounded-2xl hover:bg-white hover:text-black transition shadow-2xl uppercase italic text-xl border-b-8 border-[#800b18]">
                    <i class="fab fa-whatsapp mr-2"></i> COMPRAR AHORA
                </a>
            </div>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const autoId = params.get('id');
        let currentSlide = 0;
        let totalSlides = 0;

        async function cargarDetalle() {
            if (!autoId) { window.location.href = 'index.html'; return; }

            const USER = 'stewardsprofile-ux';
            const REPO = 'puravidamotororiginal';
            const FOLDER = 'assets/data/autos';

            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}/${autoId}.json?t=${new Date().getTime()}`);
                const auto = await response.json();
                const data = JSON.parse(atob(auto.content));

                // Poblar Textos
                document.getElementById('auto-titulo').innerText = `${data.marca} ${data.modelo}`;
                document.getElementById('auto-descripcion').innerText = data.descripcion || "Sin descripción disponible.";
                document.getElementById('auto-km').innerText = data.km || "0 KM";
                document.getElementById('auto-transmision').innerText = data.transmision || "N/A";
                document.getElementById('auto-combustible').innerText = data.combustible || "Gasolina";
                document.getElementById('auto-traccion').innerText = data.traccion || "4x2";

                // Precio Formateado
                document.getElementById('auto-precio').innerText = new Intl.NumberFormat('es-CR', {
                    style: 'currency', currency: 'CRC', minimumFractionDigits: 0
                }).format(data.precio || 0);

                // Configurar Imágenes (Carrusel)
                const imagenes = [];
                if (data.imagen) imagenes.push(data.imagen);
                if (data.imagenes_adicionales) {
                    const extras = Array.isArray(data.imagenes_adicionales) ? data.imagenes_adicionales : [data.imagenes_adicionales];
                    imagenes.push(...extras);
                }

                const carouselContainer = document.getElementById('carousel-images');
                totalSlides = imagenes.length;
                
                imagenes.forEach((img, index) => {
                    carouselContainer.innerHTML += `<img src="${img}" class="carousel-slide ${index === 0 ? 'active' : ''}" alt="Imagen ${index}">`;
                });

                // Configurar WhatsApp con Link
                const currentUrl = window.location.href;
                const mensaje = `¡Hola! Pura Vida Motor, me interesa este vehículo: ${data.marca} ${data.modelo}. Aquí puedes verlo: ${currentUrl}`;
                document.getElementById('btn-whatsapp').href = `https://wa.me/50671162806?text=${encodeURIComponent(mensaje)}`;

            } catch (error) {
                console.error("Error:", error);
                alert("No se pudo cargar la información del vehículo.");
            }
        }

        function changeSlide(direction) {
            const slides = document.querySelectorAll('.carousel-slide');
            slides[currentSlide].classList.remove('active');
            
            currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
            
            slides[currentSlide].classList.add('active');
        }

        cargarDetalle();
    </script>
</body>
</html>
