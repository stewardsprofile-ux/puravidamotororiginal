<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Cargando Detalles... | Pura Vida Motor</title>
    <style>
        .titulo-plateado {
            background: linear-gradient(to bottom, #ffffff 0%, #a3a3a3 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body class="bg-black text-slate-300 font-sans pb-20">

    <nav class="bg-[#111] shadow-xl p-4 sticky top-0 z-50 border-b-2 border-slate-800">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a href="index.html" class="flex items-center gap-2 text-slate-400 font-black uppercase italic hover:text-[#ce1126] transition">
                <i class="fas fa-chevron-left"></i> REGRESAR
            </a>
            <div class="flex items-center gap-3">
                <img src="assets/logo.png" alt="Logo" class="h-14">
                <span class="hidden md:block font-black italic uppercase text-xl titulo-plateado">Pura Vida Motor</span>
            </div>
        </div>
    </nav>

    <div id="detalle-auto" class="container mx-auto p-4 max-w-7xl mt-12">
        </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const autoId = params.get('id');

        fetch('assets/autos.json')
            .then(res => res.json())
            .then(autos => {
                const auto = autos.find(a => a.id === autoId);
                if (auto) {
                    document.title = `${auto.marca} ${auto.modelo} | Pura Vida Motor`;
                    document.getElementById('detalle-auto').innerHTML = `
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 bg-[#111] p-6 md:p-12 rounded-[2rem] shadow-2xl border-2 border-slate-800">
                            <div class="lg:col-span-7">
                                <img src="${auto.imagen}" class="w-full rounded-2xl shadow-xl border-4 border-slate-700 object-cover h-[550px] mb-7 transition-transform duration-700 hover:scale-[1.01]">
                                <div class="grid grid-cols-4 gap-4">
                                    ${auto.galeria.map(img => `<img src="${img}" class="w-full h-32 object-cover rounded-xl border-2 border-slate-700 hover:border-[#ce1126] transition cursor-pointer">`).join('')}
                                </div>
                            </div>

                            <div class="lg:col-span-5 flex flex-col">
                                <div class="border-b-4 border-slate-800 pb-7 mb-9">
                                    <h1 class="text-5xl font-black text-white uppercase italic mb-3 tracking-tighter">${auto.marca} ${auto.modelo}</h1>
                                    <p class="text-[#a3a3a3] text-5xl font-black italic tracking-tighter">${auto.precio}</p>
                                </div>
                                
                                <div class="grid grid-cols-2 gap-5 mb-12">
                                    <div class="bg-[#1a1a1a] p-5 rounded-xl shadow-inner border border-slate-800"><span class="text-xs font-bold text-slate-500 uppercase tracking-widest">AÑO</span><p class="text-3xl font-black italic text-white">${auto.año}</p></div>
                                    <div class="bg-[#1a1a1a] p-5 rounded-xl shadow-inner border border-slate-800"><span class="text-xs font-bold text-slate-500 uppercase tracking-widest">RECORRIDO</span><p class="text-3xl font-black italic text-white">${auto.km}</p></div>
                                </div>

                                <div class="bg-[#222] p-8 rounded-2xl border-l-8 border-[#ce1126] mb-12 shadow-inner">
                                    <h3 class="font-black text-white uppercase italic mb-5 text-base tracking-widest border-b border-slate-700 pb-2">Descripción Técnica</h3>
                                    <p class="text-slate-300 leading-relaxed font-medium text-lg">${auto.descripcion}</p>
                                    <p class="mt-6 font-black text-white uppercase text-sm bg-black inline-block px-4 py-1.5 rounded-lg border border-slate-800">Caja: ${auto.transmision}</p>
                                </div>

                                <button onclick="contactar('${auto.marca} ${auto.modelo}')" 
                                    class="mt-auto w-full bg-[#ce1126] text-white py-6 rounded-2xl font-black text-2xl shadow-2xl hover:bg-white hover:text-black hover:scale-[1.02] transition-all flex items-center justify-center gap-4 uppercase italic border-b-8 border-[#800b18] tracking-tight">
                                    <i class="fab fa-whatsapp text-4xl"></i> SOLICITAR INFO
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    document.getElementById('detalle-auto').innerHTML = `<h1 class="text-center text-3xl font-black text-white mt-20 uppercase italic">Vehículo no encontrado</h1>`;
                }
            });

        function contactar(modelo) {
            const num = "50671162806"; 
            const msg = encodeURIComponent(`¡Pura Vida Motor! Quisiera información detallada del vehículo: ${modelo}.`);
            window.open(`https://wa.me/${num}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
