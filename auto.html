<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Vehículo | Pura Vida Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .btn-regresar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-regresar:hover {
            background: #ce1126;
            border-color: #ce1126;
            transform: translateX(-5px);
        }
        /* Estilos para el Carrusel */
        .carousel-container { position: relative; overflow: hidden; border-radius: 1rem; }
        .slide { display: none; width: 100%; height: 550px; object-fit: cover; }
        .slide.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Flechas Rectangulares y Modernas */
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.7); color: white; width: 50px; height: 60px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn:hover { background: #ce1126; color: white; }
        .prev { left: 0; border-radius: 0 5px 5px 0; }
        .next { right: 0; border-radius: 5px 0 0 5px; }

        .logo-glow { filter: drop-shadow(0 0 10px rgba(206, 17, 38, 0.3)); }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <nav class="border-b border-slate-900 bg-[#050505] p-6">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
            <a href="index.html">
                <img src="assets/logo.png" alt="Pura Vida Motor" class="h-12 logo-glow">
            </a>
            <a href="index.html" class="btn-regresar inline-flex items-center gap-3 px-6 py-3 rounded-xl text-xs font-black uppercase italic tracking-widest shadow-lg">
                <i class="fas fa-arrow-left text-[#ce1126]"></i> Regresar al Inventario
            </a>
        </div>
    </nav>

    <div id="detalle-auto" class="container mx-auto px-4 py-12">
        <div class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-[#ce1126] mb-4"></div>
            <p class="animate-pulse italic font-black text-slate-600 uppercase tracking-widest">Sincronizando Potencia...</p>
        </div>
    </div>

    <script>
        const USER = 'stewardsprofile-ux';
        const REPO = 'puravidamotororiginal';
        const FOLDER = 'assets/data/autos';

        let currentIndex = 0;
        let images = [];

        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;
            if (index >= slides.length) currentIndex = 0;
            else if (index < 0) currentIndex = slides.length - 1;
            else currentIndex = index;

            slides.forEach(s => s.classList.remove('active'));
            slides[currentIndex].classList.add('active');
        }

        async function cargarDetalle() {
            const params = new URLSearchParams(window.location.search);
            const idBuscado = params.get('id');
            const contenedor = document.getElementById('detalle-auto');

            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}?t=${new Date().getTime()}`);
                const files = await response.json();
                
                let auto = null;
                for (let file of files) {
                    const res = await fetch(file.download_url);
                    const data = await res.json();
                    // Buscamos coincidencia por ID
                    if (data.id === idBuscado) { auto = data; break; }
                }

                if (auto) {
                    // Galería: Principal + Fotos Extra
                    images = [auto.imagen];
                    if (auto.galeria) auto.galeria.forEach(img => { if(img.foto) images.push(img.foto); });

                    const precio = new Intl.NumberFormat('es-CR', { style: 'currency', currency: 'CRC', minimumFractionDigits: 0 }).format(auto.precio || 0);
                    
                    // Link de WhatsApp corregido
                    const currentUrl = window.location.href;
                    const mensajeWa = `¡Hola! Pura Vida Motor, estoy interesado en el ${auto.marca} ${auto.modelo}. Aquí pueden ver el vehículo: ${currentUrl}`;

                    contenedor.innerHTML = `
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                            <div>
                                <div class="carousel-container border border-slate-800 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                                    ${images.map((img, i) => `<img src="${img}" class="slide ${i === 0 ? 'active' : ''}" alt="Auto">`).join('')}
                                    ${images.length > 1 ? `
                                        <div class="nav-btn prev" onclick="showSlide(currentIndex - 1)"><i class="fas fa-chevron-left text-xl"></i></div>
                                        <div class="nav-btn next" onclick="showSlide(currentIndex + 1)"><i class="fas fa-chevron-right text-xl"></i></div>
                                    ` : ''}
                                </div>
                                <div class="grid grid-cols-5 gap-3 mt-4">
                                    ${images.map((img, i) => `
                                        <img src="${img}" onclick="showSlide(${i})" class="h-16 w-full object-cover rounded-md cursor-pointer border border-slate-900 hover:border-[#ce1126] transition-all opacity-60 hover:opacity-100">
                                    `).join('')}
                                </div>
                            </div>

                            <div class="flex flex-col">
                                <span class="text-[#ce1126] font-black italic tracking-[0.3em] text-sm mb-2 uppercase">Disponibilidad Inmediata</span>
                                <h1 class="text-6xl font-black italic uppercase leading-none mb-4 tracking-tighter">${auto.marca} <span class="text-slate-700">${auto.modelo}</span></h1>
                                <p class="text-white text-5xl font-black mb-10 italic tracking-tighter">${precio}</p>

                                <div class="grid grid-cols-2 gap-6 mb-10 bg-[#080808] p-8 rounded-3xl border border-slate-900 shadow-inner">
                                    <div class="flex items-center gap-4">
                                        <div class="bg-black p-3 rounded-lg border border-slate-800"><i class="fas fa-road text-[#ce1126]"></i></div>
                                        <div><p class="text-[10px] text-slate-500 uppercase font-black">KM</p><p class="font-black italic text-white uppercase text-sm">${auto.km || 'N/D'}</p></div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <div class="bg-black p-3 rounded-lg border border-slate-800"><i class="fas fa-cog text-[#ce1126]"></i></div>
                                        <div><p class="text-[10px] text-slate-500 uppercase font-black">Caja</p><p class="font-black italic text-white uppercase text-sm">${auto.transmision || 'Consultar'}</p></div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <div class="bg-black p-3 rounded-lg border border-slate-800"><i class="fas fa-gas-pump text-[#ce1126]"></i></div>
                                        <div><p class="text-[10px] text-slate-500 uppercase font-black">Motor</p><p class="font-black italic text-white uppercase text-sm">${auto.combustible || 'Gasolina'}</p></div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <div class="bg-black p-3 rounded-lg border border-slate-800"><i class="fas fa-truck-monster text-[#ce1126]"></i></div>
                                        <div><p class="text-[10px] text-slate-500 uppercase font-black">Tracción</p><p class="font-black italic text-white uppercase text-sm">${auto.traccion || '4x2'}</p></div>
                                    </div>
                                </div>

                                <div class="mb-10">
                                    <h3 class="text-[#ce1126] font-black uppercase tracking-widest text-xs mb-4 italic">Ficha de Información</h3>
                                    <p class="text-slate-400 text-lg leading-relaxed border-l-4 border-[#ce1126] pl-6 italic">${auto.descripcion || 'Contacte con un asesor para más detalles.'}</p>
                                </div>

                                <a href="https://wa.me/50671162806?text=${encodeURIComponent(mensajeWa)}" 
                                   class="bg-[#ce1126] hover:bg-white hover:text-black text-white text-center font-black py-6 rounded-2xl transition-all shadow-2xl uppercase italic text-2xl flex items-center justify-center gap-4 border-b-8 border-black active:border-b-0 active:translate-y-1">
                                    <i class="fab fa-whatsapp text-3xl"></i> CONSULTAR ASESOR
                                </a>
                            </div>
                        </div>
                    `;
                } else {
                    contenedor.innerHTML = `<div class="text-center py-20"><h2 class="text-4xl font-black italic">AUTO NO ENCONTRADO</h2><a href="index.html" class="text-[#ce1126] underline mt-4 block">Volver al inicio</a></div>`;
                }
            } catch (e) {
                contenedor.innerHTML = `<div class="text-center py-20"><h2 class="text-2xl font-black text-[#ce1126]">ERROR DE CONEXIÓN AL INVENTARIO</h2></div>`;
            }
        }
        cargarDetalle();
    </script>
</body>
</html>
