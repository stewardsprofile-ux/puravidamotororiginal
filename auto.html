<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Vehículo | Pura Vida Motor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .btn-regresar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .btn-regresar:hover {
            background: #ce1126;
            border-color: #ce1126;
            transform: translateX(-5px);
        }
        /* Estilos para el Carrusel */
        .carousel-container { position: relative; overflow: hidden; border-radius: 1.5rem; }
        .slide { display: none; width: 100%; height: 500px; object-fit: cover; }
        .slide.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.5); color: white; padding: 15px;
            cursor: pointer; border-radius: 50%; transition: 0.3s;
        }
        .nav-btn:hover { background: #ce1126; }
        .prev { left: 10px; }
        .next { right: 10px; }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div class="container mx-auto px-4 pt-8">
        <a href="index.html" class="btn-regresar inline-flex items-center gap-3 px-6 py-3 rounded-xl text-sm font-black uppercase italic tracking-tighter shadow-lg">
            <i class="fas fa-arrow-left"></i> Regresar al Inventario
        </a>
    </div>

    <div id="detalle-auto" class="container mx-auto px-4 py-10">
        <div class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-[#ce1126] mb-4"></div>
            <p class="animate-pulse italic font-bold text-slate-500 uppercase">Sincronizando Inventario...</p>
        </div>
    </div>

    <script>
        const USER = 'stewardsprofile-ux';
        const REPO = 'puravidamotororiginal';
        const FOLDER = 'assets/data/autos';

        let currentIndex = 0;
        let images = [];

        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            if (index >= slides.length) currentIndex = 0;
            else if (index < 0) currentIndex = slides.length - 1;
            else currentIndex = index;

            slides.forEach(s => s.classList.remove('active'));
            slides[currentIndex].classList.add('active');
        }

        async function cargarDetalle() {
            const params = new URLSearchParams(window.location.search);
            const idBuscado = params.get('id');
            const contenedor = document.getElementById('detalle-auto');

            try {
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
                const files = await response.json();
                
                let auto = null;
                for (let file of files) {
                    const res = await fetch(file.download_url);
                    const data = await res.json();
                    if (data.id === idBuscado) { auto = data; break; }
                }

                if (auto) {
                    // Preparar galería (Imagen principal + fotos extra)
                    images = [auto.imagen];
                    if (auto.galeria) auto.galeria.forEach(img => images.push(img.foto));

                    const precio = new Intl.NumberFormat('es-CR', { style: 'currency', currency: 'CRC', minimumFractionDigits: 0 }).format(auto.precio || 0);
                    
                    // URL de la página actual para el mensaje de WhatsApp
                    const currentUrl = window.location.href;
                    const mensajeWa = `¡Hola! Estoy interesado en el ${auto.marca} ${auto.modelo}. Aquí puedes ver el vehículo: ${currentUrl}`;

                    contenedor.innerHTML = `
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                            <div>
                                <div class="carousel-container border-2 border-slate-900 shadow-2xl">
                                    ${images.map((img, i) => `<img src="${img}" class="slide ${i === 0 ? 'active' : ''}">`).join('')}
                                    ${images.length > 1 ? `
                                        <div class="nav-btn prev" onclick="showSlide(currentIndex - 1)"><i class="fas fa-chevron-left"></i></div>
                                        <div class="nav-btn next" onclick="showSlide(currentIndex + 1)"><i class="fas fa-chevron-right"></i></div>
                                    ` : ''}
                                </div>
                                <div class="grid grid-cols-4 gap-4 mt-4">
                                    ${images.map((img, i) => `<img src="${img}" onclick="showSlide(${i})" class="h-20 w-full object-cover rounded-lg cursor-pointer border border-slate-800 hover:border-[#ce1126] transition">`).join('')}
                                </div>
                            </div>

                            <div class="flex flex-col">
                                <h1 class="text-6xl font-black italic uppercase leading-none mb-2">${auto.marca} <span class="text-slate-600">${auto.modelo}</span></h1>
                                <p class="text-[#ce1126] text-5xl font-black mb-8 italic">${precio}</p>

                                <div class="grid grid-cols-2 gap-4 mb-8 bg-[#0a0a0a] p-6 rounded-2xl border border-slate-900">
                                    <div class="flex items-center gap-4">
                                        <i class="fas fa-road text-[#ce1126] text-xl"></i>
                                        <div><p class="text-[10px] text-slate-500 uppercase font-bold">Recorrido</p><p class="font-bold uppercase text-sm">${auto.km || '---'}</p></div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <i class="fas fa-cog text-[#ce1126] text-xl"></i>
                                        <div><p class="text-[10px] text-slate-500 uppercase font-bold">Transmisión</p><p class="font-bold uppercase text-sm">${auto.transmision || 'Consultar'}</p></div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <i class="fas fa-gas-pump text-[#ce1126] text-xl"></i>
                                        <div><p class="text-[10px] text-slate-500 uppercase font-bold">Combustible</p><p class="font-bold uppercase text-sm">${auto.combustible || '---'}</p></div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <i class="fas fa-truck-monster text-[#ce1126] text-xl"></i>
                                        <div><p class="text-[10px] text-slate-500 uppercase font-bold">Tracción</p><p class="font-bold uppercase text-sm">${auto.traccion || '---'}</p></div>
                                    </div>
                                </div>

                                <div class="mb-8">
                                    <h3 class="text-[#ce1126] font-black uppercase tracking-widest text-xs mb-3 italic">Descripción</h3>
                                    <p class="text-slate-400 leading-relaxed border-l-2 border-slate-800 pl-4">${auto.descripcion || 'Sin detalles adicionales.'}</p>
                                </div>

                                <a href="https://wa.me/50671162806?text=${encodeURIComponent(mensajeWa)}" 
                                   class="bg-[#ce1126] hover:bg-white hover:text-black text-white text-center font-black py-5 rounded-2xl transition-all shadow-xl uppercase italic text-xl flex items-center justify-center gap-4 border-b-4 border-black">
                                    <i class="fab fa-whatsapp text-2xl"></i> Contactar por WhatsApp
                                </a>
                            </div>
                        </div>
                    `;
                } else {
                    contenedor.innerHTML = `<h2 class="text-center text-2xl">Vehículo no encontrado.</h2>`;
                }
            } catch (e) {
                contenedor.innerHTML = `<h2 class="text-center text-[#ce1126]">Error de conexión.</h2>`;
            }
        }
        cargarDetalle();
    </script>
</body>
</html>
