<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pura Vida Motor | Tu próximo vehículo está aquí</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .titulo-plateado {
            background: linear-gradient(to bottom, #ffffff 0%, #a3a3a3 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.5));
        }
        .bg-carbono {
            background-color: #1a1a1a;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre-big.png');
        }
        /* Estilos para el carrusel de testimonios */
        .testimonial-slide {
            display: none;
            animation: fadeIn 0.8s ease-in-out;
        }
        .testimonial-slide.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-black text-slate-300 font-sans">

    <nav class="bg-[#111] shadow-2xl p-2 sticky top-0 z-50 border-b-2 border-slate-800">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a href="index.html" class="flex items-center gap-4">
                <img src="assets/logo.png" alt="Logo" class="h-16 md:h-24 w-auto">
                <span class="text-2xl md:text-3xl font-black tracking-tighter uppercase italic titulo-plateado">PURA VIDA MOTOR</span>
            </a>
            
            <div class="flex items-center gap-4 md:gap-8">
                <a href="#testimonios" class="hidden md:block text-white font-bold italic uppercase hover:text-[#ce1126] transition text-sm tracking-widest">
                    Testimonios
                </a>
                <a href="https://wa.me/50671162806" class="bg-[#ce1126] text-white px-8 py-3 rounded-xl font-bold hover:bg-white hover:text-black transition shadow-lg flex items-center gap-2 border-b-4 border-[#800b18]">
                    <i class="fab fa-whatsapp text-xl"></i> <span class="hidden md:inline italic uppercase">CONTACTAR</span>
                </a>
            </div>
        </div>
    </nav>

    <section class="bg-carbono py-32 text-white relative border-b-8 border-slate-900">
        <div class="container mx-auto px-4 text-center relative z-10">
            <h2 class="text-5xl md:text-8xl font-black mb-4 uppercase italic tracking-tighter titulo-plateado">
                TU PRÓXIMO VEHÍCULO <br> ESTÁ AQUÍ
            </h2>
            <p class="text-[#ce1126] text-xl md:text-2xl font-bold italic tracking-[0.2em] uppercase">
                Calidad y Respaldo en Costa Rica
            </p>
        </div>
    </section>

    <section id="inventario" class="py-20 container mx-auto px-4">
        <div class="flex flex-col items-center mb-16">
            <h3 class="text-3xl font-black uppercase italic text-white tracking-widest border-l-8 border-[#ce1126] pl-4">
                Entrega Inmediata
            </h3>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12" id="lista-autos">
            <div class="col-span-full text-center py-10">
                <p class="text-xl animate-pulse">Cargando motores...</p>
            </div>
        </div>
    </section>

    <section id="testimonios" class="bg-[#080808] py-24 border-y border-slate-900">
        <div class="container mx-auto px-4">
            <div class="max-w-4xl mx-auto text-center">
                <h3 class="text-[#ce1126] font-black uppercase italic tracking-widest text-sm mb-4">Experiencias Pura Vida</h3>
                <div id="testimonios-container" class="relative min-h-[350px] flex items-center justify-center">
                    <p class="text-slate-500 animate-pulse italic">Cargando reseñas de clientes...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-[#0a0a0a] text-slate-600 py-20 border-t-8 border-slate-900">
        <div class="container mx-auto px-4 text-center">
            <div class="flex flex-col items-center gap-6 mb-10">
                <img src="assets/logo.png" alt="Logo" class="h-28 opacity-80">
                <span class="text-3xl font-black italic titulo-plateado">PURA VIDA MOTOR</span>
            </div>
            <p class="text-xs tracking-[0.5em] opacity-40 font-bold uppercase">&copy; 2026 PURA VIDA MOTOR - HIGH PERFORMANCE LINE</p>
        </div>
    </footer>

    <script>
        const USER = 'stewardsprofile-ux'; 
        const REPO = 'puravidamotororiginal'; 
        const FOLDER_AUTOS = 'assets/data/autos';
        const FOLDER_TESTIMONIOS = 'assets/data/testimonios';

        // --- CARGAR TESTIMONIOS ---
        async function cargarTestimonios() {
            const contenedor = document.getElementById('testimonios-container');
            try {
                const t = new Date().getTime();
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER_TESTIMONIOS}?t=${t}`);
                const files = await response.json();

                if (!Array.isArray(files) || files.length === 0) {
                    contenedor.innerHTML = '<p class="text-slate-600 italic">No hay testimonios aún.</p>';
                    return;
                }

                const jsonFiles = files.filter(file => file.name.endsWith('.json'));
                const promesas = jsonFiles.map(file => fetch(`${file.download_url}?t=${t}`).then(res => res.json()));
                const testimonios = await Promise.all(promesas);

                contenedor.innerHTML = ''; 

                testimonios.forEach((test, index) => {
                    const estrellasNum = parseInt(test.estrellas) || 5;
                    const estrellasHtml = '<i class="fas fa-star"></i>'.repeat(estrellasNum);
                    
                    contenedor.innerHTML += `
                        <div class="testimonial-slide w-full ${index === 0 ? 'active' : ''}">
                            <div class="flex justify-center mb-6">
                                <img src="${test.foto || 'assets/logo.png'}" class="w-24 h-24 rounded-full object-cover border-4 border-[#ce1126] shadow-2xl bg-black">
                            </div>
                            <i class="fas fa-quote-left text-4xl text-slate-800 mb-6"></i>
                            <p class="text-xl md:text-2xl italic font-medium text-white mb-8 px-4">"${test.comentario}"</p>
                            <h4 class="text-[#ce1126] font-black uppercase italic tracking-tighter text-lg">${test.nombre}</h4>
                            <div class="flex justify-center gap-1 mt-2 text-yellow-500 text-xs">
                                ${estrellasHtml}
                            </div>
                        </div>
                    `;
                });

                iniciarCarrusel();

            } catch (error) {
                console.error("Error Testimonios:", error);
                contenedor.innerHTML = '';
            }
        }

        function iniciarCarrusel() {
            let currentSlide = 0;
            const slides = document.querySelectorAll('.testimonial-slide');
            if (slides.length <= 1) return;

            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 5000);
        }

        // --- CARGAR INVENTARIO ---
        async function cargarInventario() {
            const contenedor = document.getElementById('lista-autos');
            try {
                const t = new Date().getTime();
                const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER_AUTOS}?t=${t}`);
                const files = await response.json();

                if (!Array.isArray(files) || files.length === 0) {
                    contenedor.innerHTML = '<p class="text-center col-span-3 py-10 italic text-slate-500 text-xl">Inventario vacío por ahora.</p>';
                    return;
                }

                const jsonFiles = files.filter(file => file.name.endsWith('.json'));
                const autosPromises = jsonFiles.map(file => fetch(`${file.download_url}?t=${t}`).then(res => res.json()));
                const autos = await Promise.all(autosPromises);

                contenedor.innerHTML = ''; 

                autos.forEach(auto => {
                    const precioFormateado = new Intl.NumberFormat('es-CR', {
                        style: 'currency', currency: 'CRC', minimumFractionDigits: 0
                    }).format(auto.precio || 0);

                    contenedor.innerHTML += `
                        <div class="bg-[#111] rounded-3xl shadow-2xl overflow-hidden border-2 border-slate-800 group hover:border-[#ce1126] transition-all duration-500 flex flex-col h-full">
                            <div class="relative overflow-hidden">
                                <img src="${auto.imagen || 'assets/logo.png'}" class="w-full h-72 object-cover grayscale-[30%] group-hover:grayscale-0 transition duration-700 group-hover:scale-105" alt="${auto.marca}">
                                <div class="absolute top-6 left-6 bg-[#ce1126] text-white px-4 py-1 rounded-md font-black italic shadow-lg text-sm tracking-widest">${auto.año || '2026'}</div>
                            </div>
                            <div class="p-8 flex flex-col flex-grow">
                                <h4 class="text-2xl font-black text-white uppercase italic mb-1 tracking-tighter">${auto.marca} ${auto.modelo}</h4>
                                <p class="text-[#ce1126] text-3xl font-black mb-6 italic tracking-tighter">${precioFormateado}</p>
                                <div class="grid grid-cols-2 gap-4 text-[10px] font-black text-slate-400 mb-8 uppercase tracking-widest border-t border-slate-800 pt-6">
                                    <span class="flex items-center gap-2"><i class="fas fa-road text-[#ce1126]"></i> ${auto.km || '0 KM'}</span>
                                    <span class="flex items-center gap-2"><i class="fas fa-cog text-[#ce1126]"></i> ${auto.transmision || 'Manual'}</span>
                                    <span class="flex items-center gap-2"><i class="fas fa-gas-pump text-[#ce1126]"></i> ${auto.combustible || 'Gasolina'}</span>
                                    <span class="flex items-center gap-2"><i class="fas fa-truck-monster text-[#ce1126]"></i> ${auto.traccion || '4x2'}</span>
                                </div>
                                <a href="auto.html?id=${auto.id || 'detalle'}" class="block text-center bg-white text-black font-black py-4 rounded-xl hover:bg-[#ce1126] hover:text-white transition shadow-xl uppercase italic text-sm border-b-4 border-slate-300 hover:border-[#800b18]">
                                    Ver Especificaciones
                                </a>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error Autos:", error);
                contenedor.innerHTML = '<p class="text-center col-span-3">Error al cargar el catálogo.</p>';
            }
        }

        // Inicializar cargas
        cargarInventario();
        cargarTestimonios();
    </script>
</body>
</html>
