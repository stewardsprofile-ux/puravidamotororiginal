backend:
  name: github
  repo: stewardsprofile-ux/puravidamotororiginal
  branch: main
  # Mantenemos tu URL de Vercel intacta para no romper la conexión
  base_url: https://decap-cms-vercel-stewardsprofile-uxs-projects.vercel.app
  auth_endpoint: api/auth

media_folder: "assets/images/autos"
public_folder: "/assets/images/autos"

collections:
  - name: "autos"
    label: "Inventario de Autos"
    folder: "assets/data/autos"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "ID Único", name: "id", widget: "string" }
      - { label: "Marca", name: "marca", widget: "string" }
      - { label: "Modelo", name: "modelo", widget: "string" }
      - { label: "Año", name: "año", widget: "number" }
      - { label: "Precio", name: "precio", widget: "string" }
      - { label: "Imagen Principal", name: "imagen", widget: "image" }
      - { label: "Transmisión", name: "transmision", widget: "string", default: "Manual" }
      - { label: "Kilometraje", name: "km", widget: "string", default: "0 KM" }
      - { label: "Descripción", name: "descripcion", widget: "text" }
      # Nueva sección para subir múltiples fotos del carro
      - label: "Galería de Imágenes"
        name: "galeria"
        widget: "list"
        required: false
        fields:
          - { label: "Foto Extra", name: "foto", widget: "image" }
